<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS miniproject</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Our Team</h1>
        <nav>
            <a href="#profile1">hulk</a>
            <a href="#profile2">thor</a>
            <a href="#profile3">panther</a>
        </nav>
    </header>
    
    <main>
     <article id="profile1" class="card">
        <figure>
            <img src="hulk.png" alt="hulk" width="500" height="500">
            <figcaption>Hulk maru</figcaption>
        </figure>
        <p><q>I maru loki</q></p>
     </article>
     <article id="profile2" class="card">
        <figure>
            <img src="thor.png" alt="tho" width="500" height="500">
            <figcaption>Thor maru</figcaption>
        </figure>
        <p><q>I maru thanos</q></p>
     </article>
     <article id="profile3" class="card">
        <figure>
            <img src="blackpanther.png" alt="panther" width="500" height="500">
            <figcaption><span class="nowrap">Thor maru</span></figcaption>
        </figure>
        <p><q>I maru captain</q></p>
     </article>
    </main>

    <footer>
        <p>&copy; Marval studio.</p>
    </footer>
    
</body>
</html>
