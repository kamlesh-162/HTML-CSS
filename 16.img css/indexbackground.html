<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>background</title>

<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

body{
    min-height: 100vh;
    background-color: aliceblue;
    background-image:linear-gradient(to bottom left ,rgb(65, 134, 190), #fff) ;
}

.name{
    font-weight: 800;
    font-size: 10rem;
    text-align: center;
    background-image: url(./back\ \(1\).png);
    background-size: 100%;
    text-transform: uppercase;
    -webkit-background-clip: text;
    color: hsla(0, 0%, 0%, 0);

}










</style>

</head>
<body>
    <p class="name">
        Kamlesh
    </p>
</body>
</html>
